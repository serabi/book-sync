<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BookFusion - PageKeeper</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="/static/icon.png">
    <link rel="apple-touch-icon" href="/static/icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/variables.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/bookfusion.css">
</head>

<body>
    {% include 'partials/navbar.html' %}

    <div class="bf-container">
        <div class="bf-header">
            <div>
                <h2>BookFusion</h2>
                <p>Upload books from Booklore and sync highlights.</p>
            </div>
        </div>

        <div class="bf-tabs">
            <button class="bf-tab active" onclick="switchBFTab('highlights')">Highlights</button>
            <button class="bf-tab" onclick="switchBFTab('library')">Library</button>
            <button class="bf-tab" onclick="switchBFTab('upload')">Upload Books</button>
        </div>

        <!-- Upload Panel -->
        <div class="bf-panel" id="bf-panel-upload">
            <div class="bf-search">
                <input type="text" id="bf-search-input" placeholder="Search Booklore books..." oninput="debounceSearch()">
            </div>
            <div id="bf-book-list" class="bf-book-list">
                <div class="bf-empty">Type to search your Booklore library</div>
            </div>
        </div>

        <!-- Library Panel -->
        <div class="bf-panel" id="bf-panel-library">
            <div class="bf-search">
                <input type="text" id="bf-library-search" placeholder="Filter library..." oninput="filterLibrary()">
            </div>
            <div id="bf-library-list" class="bf-book-list">
                <div class="bf-empty">Loading library catalog...</div>
            </div>
        </div>

        <!-- Highlights Panel -->
        <div class="bf-panel active" id="bf-panel-highlights">
            <div class="bf-sync-bar">
                <button class="btn btn-primary" id="bf-sync-btn" onclick="syncHighlights(false)">Sync Highlights</button>
                <button class="btn btn-primary" id="bf-resync-btn" onclick="syncHighlights(true)" style="background: var(--color-text-muted);">Full Re-sync</button>
                <span class="bf-sync-info" id="bf-sync-info"></span>
            </div>
            <div id="bf-highlights-container">
                <div class="bf-empty">Click "Sync Highlights" to fetch highlights from BookFusion</div>
            </div>
        </div>
    </div>

    <script>
    /* ── Helpers ── */
    function el(tag, cls, text) {
        const e = document.createElement(tag);
        if (cls) e.className = cls;
        if (text) e.textContent = text;
        return e;
    }

    function clearChildren(node) {
        while (node.firstChild) node.removeChild(node.firstChild);
    }

    /* ── Tab switching ── */
    function switchBFTab(tab) {
        document.querySelectorAll('.bf-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.bf-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('bf-panel-' + tab).classList.add('active');
        event.target.classList.add('active');

        if (tab === 'highlights') loadHighlights();
        if (tab === 'library') loadLibrary();
    }

    /* ── Upload Tab ── */
    let searchTimer;
    function debounceSearch() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(searchBooks, 300);
    }

    function searchBooks() {
        const q = document.getElementById('bf-search-input').value.trim();
        const list = document.getElementById('bf-book-list');
        if (!q) {
            clearChildren(list);
            list.appendChild(el('div', 'bf-empty', 'Type to search your Booklore library'));
            return;
        }
        fetch('/api/bookfusion/booklore-books?q=' + encodeURIComponent(q))
            .then(function(r) { return r.json(); })
            .then(function(books) {
                clearChildren(list);
                if (!books.length) {
                    list.appendChild(el('div', 'bf-empty', 'No books found'));
                    return;
                }
                books.forEach(function(b) {
                    var item = el('div', 'bf-book-item');

                    var info = el('div', 'bf-book-info');
                    info.appendChild(el('div', 'bf-book-title', b.title || b.fileName));

                    var meta = el('div', 'bf-book-meta');
                    if (b.authors) {
                        meta.appendChild(document.createTextNode(b.authors + ' \u00B7 '));
                    }
                    meta.appendChild(document.createTextNode(b.fileName + ' '));
                    meta.appendChild(el('span', 'bf-source-tag', b.source));
                    info.appendChild(meta);
                    item.appendChild(info);

                    var btn = el('button', 'bf-upload-btn', 'Upload');
                    btn.addEventListener('click', function() { uploadBook(btn, b); });
                    item.appendChild(btn);

                    list.appendChild(item);
                });
            });
    }

    function uploadBook(btn, book) {
        btn.disabled = true;
        btn.textContent = 'Uploading...';

        fetch('/api/bookfusion/upload', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                book_id: book.id,
                source_tag: book.source_tag,
                title: book.title,
                authors: book.authors,
                fileName: book.fileName,
            })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) {
                btn.textContent = 'Done';
                btn.classList.add('done');
            } else {
                btn.textContent = data.error || 'Error';
                btn.classList.add('error');
                btn.disabled = false;
            }
        })
        .catch(function() {
            btn.textContent = 'Error';
            btn.classList.add('error');
            btn.disabled = false;
        });
    }

    /* ── Render highlight markdown as safe DOM nodes ── */
    function renderHighlight(container, text) {
        // Strip block-level markdown and render as readable paragraphs
        var lines = text.split('\n');
        var currentP = null;

        lines.forEach(function(line) {
            // Strip blockquote prefixes
            line = line.replace(/^>\s*/g, '');
            // Strip heading markers
            line = line.replace(/^#{1,6}\s+/, '');
            // Strip horizontal rules
            if (/^[-*_]{3,}\s*$/.test(line)) return;
            // Strip image syntax ![alt](url)
            line = line.replace(/!\[([^\]]*)\]\([^)]*\)/g, '');

            // Convert inline markdown to text
            // Bold+italic
            line = line.replace(/\*\*\*(.+?)\*\*\*/g, '$1');
            line = line.replace(/___(.+?)___/g, '$1');
            // Bold
            line = line.replace(/\*\*(.+?)\*\*/g, '$1');
            line = line.replace(/__(.+?)__/g, '$1');
            // Italic
            line = line.replace(/\*(.+?)\*/g, '$1');
            line = line.replace(/_(.+?)_/g, '$1');
            // Inline code
            line = line.replace(/`(.+?)`/g, '$1');
            // Links [text](url) → just text
            line = line.replace(/\[([^\]]*)\]\([^)]*\)/g, '$1');
            // Obsidian wiki-links [[target|display]] or [[target]]
            line = line.replace(/\[\[([^|\]]*)\|([^\]]*)\]\]/g, '$2');
            line = line.replace(/\[\[([^\]]*)\]\]/g, '$1');
            // Strip Obsidian block IDs ^block-id
            line = line.replace(/\s*\^[\w-]+\s*$/, '');

            line = line.trim();

            if (!line) {
                // Empty line = paragraph break
                currentP = null;
                return;
            }

            if (!currentP) {
                currentP = document.createElement('p');
                currentP.style.margin = '0 0 0.5em 0';
                container.appendChild(currentP);
            } else {
                currentP.appendChild(document.createElement('br'));
            }
            currentP.appendChild(document.createTextNode(line));
        });
    }

    /* ── Highlights Tab ── */
    function syncHighlights(fullResync) {
        var btn = document.getElementById('bf-sync-btn');
        var resyncBtn = document.getElementById('bf-resync-btn');
        var info = document.getElementById('bf-sync-info');
        btn.disabled = true;
        resyncBtn.disabled = true;
        btn.textContent = fullResync ? 'Re-syncing...' : 'Syncing...';
        info.textContent = '';

        fetch('/api/bookfusion/sync-highlights', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ full_resync: !!fullResync })
        })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                btn.disabled = false;
                resyncBtn.disabled = false;
                btn.textContent = 'Sync Highlights';
                if (data.success) {
                    var parts = [];
                    if (data.new_highlights) parts.push(data.new_highlights + ' new highlight' + (data.new_highlights !== 1 ? 's' : ''));
                    if (data.books_saved) parts.push(data.books_saved + ' book' + (data.books_saved !== 1 ? 's' : '') + ' cataloged');
                    info.textContent = parts.length ? 'Synced: ' + parts.join(', ') : 'Up to date';
                    loadHighlights();
                } else {
                    info.textContent = data.error || 'Sync failed';
                }
            })
            .catch(function() {
                btn.disabled = false;
                resyncBtn.disabled = false;
                btn.textContent = 'Sync Highlights';
                info.textContent = 'Sync failed';
            });
    }

    var _pkBooks = []; // PageKeeper books for journal matching

    function loadHighlights() {
        fetch('/api/bookfusion/highlights')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var container = document.getElementById('bf-highlights-container');
                clearChildren(container);

                _pkBooks = data.books || [];
                var groups = data.highlights;
                var bookNames = Object.keys(groups);

                if (!bookNames.length) {
                    var msg = data.has_synced ? 'No highlights found' : 'Click "Sync Highlights" to fetch highlights from BookFusion';
                    container.appendChild(el('div', 'bf-empty', msg));
                    return;
                }

                bookNames.forEach(function(book) {
                    var groupData = groups[book];
                    var hls = groupData.highlights;
                    var matchedAbsId = groupData.matched_abs_id;
                    var group = el('div', 'bf-highlight-group');

                    var header = el('div', 'bf-group-header');
                    header.appendChild(el('span', 'chevron', '\u25BC'));
                    header.appendChild(document.createTextNode(' ' + book + ' '));
                    header.appendChild(el('span', 'bf-count', '(' + hls.length + ')'));
                    if (matchedAbsId) {
                        header.appendChild(el('span', 'bf-match-badge', '\u2714 Linked'));
                    }
                    header.addEventListener('click', function(e) {
                        // Don't toggle when clicking the save button/select
                        if (e.target.closest('.bf-journal-controls')) return;
                        header.classList.toggle('collapsed');
                        hlBody.classList.toggle('hidden');
                    });

                    // Journal save controls
                    var controls = el('span', 'bf-journal-controls');
                    var select = document.createElement('select');
                    select.className = 'bf-book-select';
                    select.dataset.bookTitle = book;
                    var defaultOpt = document.createElement('option');
                    defaultOpt.value = '';
                    defaultOpt.textContent = 'Match to book\u2026';
                    select.appendChild(defaultOpt);
                    _pkBooks.forEach(function(b) {
                        var opt = document.createElement('option');
                        opt.value = b.abs_id;
                        opt.textContent = b.title;
                        if (matchedAbsId && b.abs_id === matchedAbsId) {
                            opt.selected = true;
                        }
                        select.appendChild(opt);
                    });
                    select.addEventListener('change', function() {
                        linkHighlight(book, select.value);
                    });
                    controls.appendChild(select);

                    var saveBtn = el('button', 'bf-upload-btn', 'Save to Journal');
                    saveBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        saveToJournal(saveBtn, select.value, hls);
                    });
                    controls.appendChild(saveBtn);
                    header.appendChild(controls);
                    group.appendChild(header);

                    var hlBody = el('div', 'bf-group-body');
                    hls.forEach(function(h) {
                        var hlDiv = el('div', 'bf-highlight');

                        // Show parsed quote instead of raw markdown
                        var contentDiv = el('div', 'bf-highlight-content');
                        contentDiv.appendChild(document.createTextNode(h.quote || ''));
                        hlDiv.appendChild(contentDiv);

                        var metaDiv = el('div', 'bf-highlight-chapter');
                        var parts = [];
                        if (h.chapter_heading) parts.push(h.chapter_heading.replace(/^#{1,6}\s*/, ''));
                        if (h.date) parts.push(h.date);
                        if (parts.length) metaDiv.textContent = parts.join(' \u00B7 ');
                        hlDiv.appendChild(metaDiv);

                        hlBody.appendChild(hlDiv);
                    });
                    group.appendChild(hlBody);

                    container.appendChild(group);
                });
            });
    }

    function saveToJournal(btn, absId, highlights) {
        if (!absId) {
            btn.textContent = 'Select a book first';
            btn.classList.add('error');
            setTimeout(function() {
                btn.textContent = 'Save to Journal';
                btn.classList.remove('error');
            }, 2000);
            return;
        }
        btn.disabled = true;
        btn.textContent = 'Saving...';

        var payload = highlights.map(function(h) {
            return {
                quote: h.quote || '',
                chapter: (h.chapter_heading || '').replace(/^#{1,6}\s*/, '')
            };
        });

        fetch('/api/bookfusion/save-journal', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ abs_id: absId, highlights: payload })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) {
                btn.textContent = '\u2713 Saved ' + data.saved;
                btn.classList.add('done');
            } else {
                btn.textContent = data.error || 'Error';
                btn.classList.add('error');
                btn.disabled = false;
            }
        })
        .catch(function() {
            btn.textContent = 'Error';
            btn.classList.add('error');
            btn.disabled = false;
        });
    }
    function linkHighlight(bookTitle, absId) {
        fetch('/api/bookfusion/link-highlight', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ book_title: bookTitle, abs_id: absId || null })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) loadHighlights();
        });
    }

    /* ── Library Tab ── */
    var _libraryData = [];
    var _dashboardBooks = [];

    function loadLibrary() {
        var list = document.getElementById('bf-library-list');
        clearChildren(list);
        list.appendChild(el('div', 'bf-empty', 'Loading...'));

        fetch('/api/bookfusion/library')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                _libraryData = data.books || [];
                _dashboardBooks = data.dashboard_books || [];
                renderLibrary(_libraryData);
            })
            .catch(function() {
                clearChildren(list);
                list.appendChild(el('div', 'bf-empty', 'Failed to load library'));
            });
    }

    function filterLibrary() {
        var q = document.getElementById('bf-library-search').value.trim().toLowerCase();
        if (!q) {
            renderLibrary(_libraryData);
            return;
        }
        var filtered = _libraryData.filter(function(b) {
            return (b.title + ' ' + b.authors + ' ' + b.series + ' ' + b.filename).toLowerCase().indexOf(q) !== -1;
        });
        renderLibrary(filtered);
    }

    function renderLibrary(books) {
        var list = document.getElementById('bf-library-list');
        clearChildren(list);

        if (!books.length) {
            list.appendChild(el('div', 'bf-empty', _libraryData.length ? 'No matches' : 'No books in catalog. Run a Full Re-sync to populate.'));
            return;
        }

        books.forEach(function(b) {
            var item = el('div', 'bf-book-item');

            var info = el('div', 'bf-book-info');
            info.appendChild(el('div', 'bf-book-title', b.title || b.filename));

            var meta = el('div', 'bf-book-meta');
            if (b.authors) meta.appendChild(document.createTextNode(b.authors));
            if (b.series) {
                if (b.authors) meta.appendChild(document.createTextNode(' \u00B7 '));
                meta.appendChild(document.createTextNode(b.series));
            }
            if (b.highlight_count > 0) {
                meta.appendChild(document.createTextNode(' '));
                meta.appendChild(el('span', 'bf-hl-count', b.highlight_count + ' highlight' + (b.highlight_count !== 1 ? 's' : '')));
            }
            if (b.filename) {
                meta.appendChild(document.createElement('br'));
                meta.appendChild(document.createTextNode(b.filename));
            }
            info.appendChild(meta);
            item.appendChild(info);

            var actions = el('div', 'bf-library-actions');
            if (b.on_dashboard) {
                var badge = document.createElement('a');
                badge.className = 'bf-dashboard-badge';
                badge.textContent = '\u2714 Matched';
                badge.href = '/reading/book/' + encodeURIComponent(b.abs_id);
                actions.appendChild(badge);
            } else {
                // Match dropdown + confirm button
                var select = document.createElement('select');
                select.className = 'bf-book-select';
                var defaultOpt = document.createElement('option');
                defaultOpt.value = '';
                defaultOpt.textContent = 'Match to book\u2026';
                select.appendChild(defaultOpt);
                _dashboardBooks.forEach(function(db) {
                    var opt = document.createElement('option');
                    opt.value = db.abs_id;
                    opt.textContent = db.title;
                    select.appendChild(opt);
                });
                actions.appendChild(select);

                var linkBtn = el('button', 'bf-upload-btn bf-link-btn', 'Link');
                linkBtn.addEventListener('click', function() {
                    if (select.value) {
                        matchToBook(linkBtn, select, b);
                    }
                });
                actions.appendChild(linkBtn);

                // Add as new book button
                var btn = el('button', 'bf-upload-btn', 'Add New');
                btn.addEventListener('click', function() { addToDashboard(btn, b); });
                actions.appendChild(btn);
            }
            item.appendChild(actions);

            list.appendChild(item);
        });
    }

    function matchToBook(btn, select, book) {
        var absId = select.value;
        btn.disabled = true;
        select.disabled = true;
        btn.textContent = 'Linking...';

        fetch('/api/bookfusion/match-to-book', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ bookfusion_id: book.bookfusion_id, abs_id: absId })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) {
                btn.textContent = '\u2714 Linked';
                btn.classList.add('done');
                book.on_dashboard = true;
                book.abs_id = absId;
            } else {
                btn.textContent = 'Link';
                btn.disabled = false;
                select.disabled = false;
            }
        })
        .catch(function() {
            btn.textContent = 'Link';
            btn.disabled = false;
            select.disabled = false;
        });
    }

    function addToDashboard(btn, book) {
        btn.disabled = true;
        btn.textContent = 'Adding...';

        fetch('/api/bookfusion/add-to-dashboard', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ bookfusion_id: book.bookfusion_id })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) {
                btn.textContent = '\u2714 Added';
                btn.classList.add('done');
                book.on_dashboard = true;
                book.abs_id = data.abs_id;
            } else {
                btn.textContent = data.error || 'Error';
                btn.classList.add('error');
                btn.disabled = false;
            }
        })
        .catch(function() {
            btn.textContent = 'Error';
            btn.classList.add('error');
            btn.disabled = false;
        });
    }

    // Load highlights on page open since it's the default tab
    loadHighlights();
    </script>
</body>

</html>
